<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 칩 본체 -->
  <rect x="6" y="6" width="20" height="20" rx="2" fill="#3B82F6"/>
  <!-- 칩 내부 다이 -->
  <rect x="10" y="10" width="12" height="12" rx="1" fill="#1E3A5F" stroke="#60A5FA" stroke-width="0.7"/>
  <!-- 내부 회로 패턴 -->
  <line x1="13" y1="12" x2="13" y2="20" stroke="#60A5FA" stroke-width="0.7" opacity="0.6"/>
  <line x1="16" y1="12" x2="16" y2="20" stroke="#60A5FA" stroke-width="0.7" opacity="0.6"/>
  <line x1="19" y1="12" x2="19" y2="20" stroke="#60A5FA" stroke-width="0.7" opacity="0.6"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="#60A5FA" stroke-width="0.7" opacity="0.6"/>
  <!-- 상단 핀 -->
  <rect x="10" y="1" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <rect x="15" y="1" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <rect x="20" y="1" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <!-- 하단 핀 -->
  <rect x="10" y="25" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <rect x="15" y="25" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <rect x="20" y="25" width="3" height="6" rx="0.7" fill="#94A3B8"/>
  <!-- 좌측 핀 -->
  <rect x="1" y="10" width="6" height="3" rx="0.7" fill="#94A3B8"/>
  <rect x="1" y="15" width="6" height="3" rx="0.7" fill="#94A3B8"/>
  <rect x="1" y="20" width="6" height="3" rx="0.7" fill="#94A3B8"/>
  <!-- 우측 핀 -->
  <rect x="25" y="10" width="6" height="3" rx="0.7" fill="#94A3B8"/>
  <rect x="25" y="15" width="6" height="3" rx="0.7" fill="#94A3B8"/>
  <rect x="25" y="20" width="6" height="3" rx="0.7" fill="#94A3B8"/>
</svg>
